<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#A52A2A">
<title>Izoh — O'zbek tilining izohli lug'ati</title>
<meta name="description" content="35,491 ta o'zbekcha so'zning ma'nosi, izohi, iboralar va misollar bilan. Oflayn ishlovchi bepul lug'at.">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Izoh">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#/" class="logo" aria-label="Bosh sahifa">
      <svg viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
        <rect width="40" height="40" fill="#A52A2A"/>
        <rect x="11" y="11" width="18" height="4" fill="#F2C8A2"/>
        <rect x="11" y="18" width="11" height="2" fill="#F2C8A2"/>
        <rect x="11" y="22" width="18" height="2" fill="#F2C8A2"/>
        <rect x="11" y="27" width="16" height="2" fill="#F2C8A2"/>
      </svg>
      <span class="logo-text">O‘zbek tilining<br>izohli lug‘ati</span>
    </a>

    <div class="search-wrap">
      <input
        id="search"
        type="search"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="So‘zlarni qidiring (lotin yoki kirill)…"
        aria-label="Qidiruv">
      <button id="search-btn" aria-label="Qidirish">
        <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M17.6 15.9 13.9 12.1c.84-1.25 1.28-2.81 1.06-4.5C14.55 4.74 12.21 2.43 9.37 2.05 5.12 1.52 1.52 5.12 2.05 9.37c.38 2.84 2.69 5.18 5.57 5.59 1.69.22 3.25-.22 4.53-1.06l3.72 3.75c.5.47 1.28.47 1.78 0 .47-.5.47-1.28-.05-1.75ZM4.49 8.49c0-2.19 1.78-4 4-4s4 1.81 4 4-1.81 4-4 4-4-1.78-4-4Z"/>
        </svg>
      </button>
      <ul id="suggestions" hidden></ul>
    </div>

    <button id="random-btn-top" class="random-btn-top" aria-label="Tasodifiy so'z" title="Tasodifiy so'z (R)">
      <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M15 2H5a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V5a3 3 0 0 0-3-3Zm-9 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm0 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm4-3.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm4 3.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm0-7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
      <span>Tasodifiy</span>
    </button>
  </div>
</header>

<main>
  <div id="view"></div>

  <section class="letters-section">
    <h2>Alifbo</h2>
    <nav id="letters" aria-label="Alifbo bo‘yicha"></nav>
  </section>
</main>

<nav class="bottom-bar" aria-label="Tezkor harakatlar">
  <a href="#/" data-nav="home" aria-label="Bosh sahifa">
    <svg viewBox="0 0 20 20" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M10 2.5 1.5 9.5h2v8h5v-5h3v5h5v-8h2L10 2.5Z"/></svg>
    <span>Bosh</span>
  </a>
  <button id="random-btn" aria-label="Tasodifiy so'z">
    <svg viewBox="0 0 20 20" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M15 2H5a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V5a3 3 0 0 0-3-3Zm-9 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm0 7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm4-3.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm4 3.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm0-7a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
    <span>Tasodifiy</span>
  </button>
  <a href="#/letters" data-nav="letters" aria-label="Barcha harflar">
    <svg viewBox="0 0 20 20" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M3 4h14v2H3V4Zm0 5h14v2H3V9Zm0 5h14v2H3v-2Z"/></svg>
    <span>Alifbo</span>
  </a>
</nav>

<script src="app.js"></script>
</body>
</html>
